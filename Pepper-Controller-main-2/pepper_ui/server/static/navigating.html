<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guiding You</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    /* Full-screen non-interactive overlay for Pepper's tablet during navigation */
    *, *:before, *:after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%; margin: 0; padding: 0;
      overflow: hidden;
      /* Prevent any touch interaction */
      pointer-events: none;
      -webkit-user-select: none; user-select: none;
    }

    body {
      font-family: sans-serif;
      background: -webkit-linear-gradient(315deg, #f7f4f0 0%, #e8dccf 100%);
      background:         linear-gradient(135deg, #f7f4f0 0%, #e8dccf 100%);
      color: #5a4a3b;
      display: -webkit-flex; display: flex;
      -webkit-flex-direction: column; flex-direction: column;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      text-align: center;
      padding: 30px;
    }

    /* Animated walking indicator */
    .pulse-ring {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: #b89a6c;
      display: -webkit-flex; display: flex;
      -webkit-align-items: center; align-items: center;
      -webkit-justify-content: center; justify-content: center;
      font-size: 56px;
      margin-bottom: 30px;
      -webkit-animation: pulse 2s ease-in-out infinite;
              animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(184, 154, 108, 0.4);
    }
    @-webkit-keyframes pulse {
      0%   { -webkit-transform: scale(1);    box-shadow: 0 0 0 0    rgba(184,154,108,0.4); }
      50%  { -webkit-transform: scale(1.05); box-shadow: 0 0 0 20px rgba(184,154,108,0);   }
      100% { -webkit-transform: scale(1);    box-shadow: 0 0 0 0    rgba(184,154,108,0);   }
    }
    @keyframes pulse {
      0%   { transform: scale(1);    box-shadow: 0 0 0 0    rgba(184,154,108,0.4); }
      50%  { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(184,154,108,0);   }
      100% { transform: scale(1);    box-shadow: 0 0 0 0    rgba(184,154,108,0);   }
    }

    .title {
      font-size: 32px; font-weight: 700;
      color: #5a4a3b;
      margin: 0 0 12px 0;
      line-height: 1.3;
    }
    .doctor-name {
      font-size: 36px; font-weight: 800;
      color: #b89a6c;
      margin: 0 0 8px 0;
    }
    .room-name {
      font-size: 20px; font-weight: 500;
      color: #8a7b6b;
      margin: 0 0 30px 0;
    }
    .follow-text {
      font-size: 22px; font-weight: 600;
      color: #5a4a3b;
      margin: 0;
    }

    /* Walking dots animation */
    .dots span {
      display: inline-block;
      width: 10px; height: 10px;
      background: #b89a6c;
      border-radius: 50%;
      margin: 0 4px;
      -webkit-animation: bounce 1.4s ease-in-out infinite both;
              animation: bounce 1.4s ease-in-out infinite both;
    }
    .dots span:nth-child(1) { -webkit-animation-delay: 0s;    animation-delay: 0s;    }
    .dots span:nth-child(2) { -webkit-animation-delay: 0.16s; animation-delay: 0.16s; }
    .dots span:nth-child(3) { -webkit-animation-delay: 0.32s; animation-delay: 0.32s; }
    @-webkit-keyframes bounce {
      0%, 80%, 100% { -webkit-transform: scale(0); }
      40%           { -webkit-transform: scale(1); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40%           { transform: scale(1); }
    }

    .footer {
      position: fixed; bottom: 20px;
      font-size: 13px; color: #a89880;
    }
  </style>
</head>
<body>

  <div class="pulse-ring">&#128694;</div>

  <p class="title">Guiding you to</p>
  <p class="doctor-name" id="doctor-name">Doctor's Room</p>
  <p class="room-name" id="room-name"></p>

  <p class="follow-text">
    Please follow me
    <span class="dots"><span></span><span></span><span></span></span>
  </p>

  <p class="footer">Andalusia Hospital &mdash; Pepper Navigation</p>

  <script>
  // Read doctor and room from URL query parameters (ES5 compatible)
  function getParam(name) {
    var match = RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
    return match ? decodeURIComponent(match[1].replace(/\+/g, ' ')) : '';
  }

  var doctor = getParam('doctor');
  var room   = getParam('room');

  if (doctor) {
    document.getElementById('doctor-name').textContent = doctor;
  }
  if (room) {
    document.getElementById('room-name').textContent = room;
  }
  </script>

</body>
</html>

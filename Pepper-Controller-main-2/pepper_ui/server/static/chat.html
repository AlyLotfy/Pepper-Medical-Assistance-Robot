<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    body { background: #f7f4f0; height: 100vh; overflow: hidden; color: #4a4034; }
    .chat-container {
      background-color: #fff; width: 92%; height: 90%;
      margin: 20px auto; border-radius: 20px;
      box-shadow: 0 10px 24px rgba(0,0,0,.10); padding: 20px;
      position: relative;
    }
    .chat-header {
      text-align: center; font-size: 20px; font-weight: bold;
      margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px;
    }
    .messages { height: 75%; overflow-y: auto; padding-right: 5px; }
    .message {
      max-width: 85%; padding: 10px 15px; border-radius: 15px;
      font-size: 15px; margin-bottom: 8px; display: block; clear: both; line-height: 1.5;
    }
    .message.user { background-color: #b89a6c; color: white; float: right; }
    .message.bot  { background-color: #f0f0f0; color: #333; float: left; }
    /* Rich cards */
    .card-row { clear: both; margin: 6px 0 10px 0; display: -webkit-flex; display: flex; flex-wrap: wrap; gap: 8px; }
    .info-card {
      background: #fff; border: 1px solid #e0d5c5; border-radius: 12px;
      padding: 10px 14px; font-size: 14px; min-width: 180px; max-width: 220px;
      box-shadow: 0 2px 6px rgba(0,0,0,.06);
    }
    .info-card .card-title { font-weight: bold; color: #b89a6c; margin-bottom: 4px; font-size: 15px; }
    .info-card .card-sub   { color: #777; font-size: 12px; }
    .info-card .card-body  { margin-top: 6px; font-size: 13px; color: #444; }
    .action-btn {
      display: inline-block; margin-top: 6px; padding: 5px 12px;
      background: #b89a6c; color: white; border: none; border-radius: 20px;
      font-size: 13px; cursor: pointer;
    }
    .confirm-card {
      clear: both; background: #f0faf0; border: 1px solid #5cb85c;
      border-radius: 12px; padding: 12px 16px; margin: 6px 0 10px 0;
      font-size: 14px; color: #2d6a2d; max-width: 360px;
    }
    .confirm-card .card-title { font-weight: bold; font-size: 15px; margin-bottom: 4px; }
    .error-card {
      clear: both; background: #fff0f0; border: 1px solid #d9534f;
      border-radius: 12px; padding: 10px 14px; margin: 6px 0 10px 0;
      font-size: 14px; color: #a94442; max-width: 360px;
    }
    .thinking { color: #aaa; font-style: italic; font-size: 14px; float: left; clear: both; margin-bottom: 8px; }
    .input-area {
      position: absolute; bottom: 20px; left: 20px; right: 20px;
      height: 50px; display: -webkit-flex; display: flex;
    }
    input {
      flex: 1; -webkit-flex: 1; border: 1px solid #ccc;
      border-radius: 25px; padding: 0 15px; font-size: 16px; outline: none;
    }
    input:focus { border-color: #b89a6c; }
    button { width: 50px; margin-left: 10px; border-radius: 50%; border: none; background: #b89a6c; color: white; font-size: 20px; cursor: pointer; }
    .back-btn { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; background: #e0e0e0; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; z-index: 100; }
    [dir="rtl"] .message.user { float: left; }
    [dir="rtl"] .message.bot  { float: right; }
    [dir="rtl"] .back-btn { left: auto; right: 20px; }
  </style>
</head>
<body>

  <div class="chat-container">
    <button class="back-btn" onclick="history.back()">&#8592;</button>
    <div class="chat-header" data-i18n="pepper_chat">Pepper Chat</div>

    <div class="messages" id="chat-area"></div>

    <!-- Sentiment indicator bar -->
    <div id="sentiment-bar" style="display:none;clear:both;padding:6px 12px;border-radius:8px;font-size:13px;margin-bottom:6px;"></div>

    <!-- Hidden file input for image -->
    <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImageUpload(this)">

    <div class="input-area">
      <input id="user-input" placeholder="Type here..." data-i18n="type_message" autocomplete="off" onkeydown="if(event.keyCode===13) sendMessage()">
      <button onclick="sendMessage()">&#10148;</button>
      <button onclick="document.getElementById('img-input').click()" title="Send image" style="width:50px;margin-left:6px;border-radius:50%;border:none;background:#8a7b6b;color:white;font-size:18px;cursor:pointer;">&#128247;</button>
      <button onclick="clearChat()" title="Clear" style="width:50px;margin-left:6px;border-radius:50%;border:none;background:#e0e0e0;color:#999;font-size:16px;cursor:pointer;">&#128465;</button>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="demo_store.js"></script>
  <script>
  var CHAT_KEY  = 'pepper_chat_history';
  var historyList = [];
  var input    = document.getElementById('user-input');
  var chatArea = document.getElementById('chat-area');

  /* ---------- persistence ---------- */
  function saveSession() { try { sessionStorage.setItem(CHAT_KEY, JSON.stringify(historyList)); } catch(e){} }
  function loadSession() { try { var v = sessionStorage.getItem(CHAT_KEY); return v ? JSON.parse(v) : null; } catch(e){ return null; } }

  function clearChat() {
    historyList = [];
    try { sessionStorage.removeItem(CHAT_KEY); } catch(e) {}
    chatArea.innerHTML = '';
    addMsg('Chat cleared. How can I help you?', 'bot');
  }

  /* ---------- current user ---------- */
  function getCurrentUser() { try { return (window.STORE && STORE.me) ? STORE.me() : null; } catch(e){ return null; } }
  function getUserName()    { var me = getCurrentUser(); return (me && me.name) ? me.name : 'Guest'; }

  /* ---------- render helpers ---------- */
  function markdownToHtml(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s, '<ul style="margin:4px 0 4px 16px">$1</ul>')
      .replace(/\n/g, '<br>');
  }

  function addMsg(text, type) {
    var div = document.createElement('div');
    div.className = 'message ' + type;
    div.innerHTML = markdownToHtml(text);
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function addThinking() {
    var div = document.createElement('div');
    div.className = 'thinking';
    div.id = 'thinking-dot';
    div.textContent = '● ● ●';
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }
  function removeThinking() { var d = document.getElementById('thinking-dot'); if(d) d.parentNode.removeChild(d); }

  function renderToolResults(results) {
    if (!results || !results.length) return;
    results.forEach(function(tr) {
      var tool = tr.tool;
      var res  = tr.result;
      if (res.error) {
        var ec = document.createElement('div');
        ec.className = 'error-card';
        ec.innerHTML = '<div class="card-title">⚠ Error</div>' + res.error;
        chatArea.appendChild(ec);
      } else if (tool === 'get_departments' && res.departments) {
        var row = document.createElement('div'); row.className = 'card-row';
        res.departments.forEach(function(d) {
          var c = document.createElement('div'); c.className = 'info-card';
          c.innerHTML = '<div class="card-title">🏥 ' + d + '</div>';
          var btn = document.createElement('button'); btn.className = 'action-btn';
          btn.textContent = 'Find doctors';
          (function(dept){ btn.onclick = function(){ input.value = 'Show doctors in ' + dept; sendMessage(); }; })(d);
          c.appendChild(btn); row.appendChild(c);
        });
        chatArea.appendChild(row);
      } else if (tool === 'get_doctors' && res.doctors) {
        var row = document.createElement('div'); row.className = 'card-row';
        res.doctors.forEach(function(d) {
          var c = document.createElement('div'); c.className = 'info-card';
          c.innerHTML = '<div class="card-title">👨‍⚕️ ' + d.name + '</div><div class="card-sub">' + d.specialty + '</div>';
          var btn = document.createElement('button'); btn.className = 'action-btn';
          btn.textContent = 'Book';
          (function(name){ btn.onclick = function(){ input.value = 'I want to book with ' + name; sendMessage(); }; })(d.name);
          c.appendChild(btn); row.appendChild(c);
        });
        chatArea.appendChild(row);
      } else if (tool === 'get_doctor_schedule' && res.schedule) {
        var row = document.createElement('div'); row.className = 'card-row';
        var c = document.createElement('div'); c.className = 'info-card'; c.style.minWidth='240px';
        var html = '<div class="card-title">📅 ' + res.doctor + '</div><div class="card-sub">' + res.specialty + '</div><div class="card-body">';
        res.schedule.forEach(function(s){ html += s.day + ': ' + s.start + ' – ' + s.end + '<br>'; });
        if (!res.schedule.length) html += 'No schedule available.';
        html += '</div>'; c.innerHTML = html; row.appendChild(c); chatArea.appendChild(row);
      } else if (tool === 'book_appointment' && res.success) {
        var cc = document.createElement('div'); cc.className = 'confirm-card';
        cc.innerHTML = '<div class="card-title">✅ Appointment Confirmed!</div>' +
          '👨‍⚕️ ' + res.doctor + ' (' + res.specialty + ')<br>' +
          '📅 ' + res.date + '  🕐 ' + res.time + '<br>' +
          '<small>Booking ID: #' + res.appointment_id + '</small>';
        chatArea.appendChild(cc);
      } else if (tool === 'cancel_appointment' && res.success) {
        var cc = document.createElement('div'); cc.className = 'confirm-card';
        cc.innerHTML = '<div class="card-title">✅ Appointment Cancelled</div>' +
          res.cancelled.doctor + ' – ' + res.cancelled.date + ' at ' + res.cancelled.time;
        chatArea.appendChild(cc);
      } else if (tool === 'get_my_appointments' && res.appointments) {
        if (!res.appointments.length) return;
        var row = document.createElement('div'); row.className = 'card-row';
        res.appointments.forEach(function(a) {
          var c = document.createElement('div'); c.className = 'info-card';
          c.innerHTML = '<div class="card-title">📋 Appt #' + a.id + '</div>' +
            '<div class="card-sub">' + a.specialty + '</div>' +
            '<div class="card-body">👨‍⚕️ ' + a.doctor + '<br>📅 ' + a.date + '  🕐 ' + a.time + '</div>';
          var btn = document.createElement('button'); btn.className = 'action-btn';
          btn.style.background = '#d9534f'; btn.textContent = 'Cancel';
          (function(id){ btn.onclick = function(){ input.value = 'Cancel appointment ' + id; sendMessage(); }; })(a.id);
          c.appendChild(btn); row.appendChild(c);
        });
        chatArea.appendChild(row);
      } else if (tool === 'get_patient_profile') {
        var c = document.createElement('div'); c.className = 'info-card'; c.style.minWidth='260px';
        var html = '<div class="card-title">👤 ' + (res.name||'') + '</div><div class="card-body">';
        if (res.age) html += 'Age: ' + res.age + (res.gender ? '  |  ' + res.gender : '') + '<br>';
        if (res.blood_type) html += 'Blood: ' + res.blood_type + '<br>';
        if (res.medical_history) html += '<b>History:</b> ' + res.medical_history + '<br>';
        if (res.allergies) html += '<b>Allergies:</b> ' + res.allergies + '<br>';
        if (res.current_medications) html += '<b>Medications:</b> ' + res.current_medications;
        html += '</div>'; c.innerHTML = html;
        var row = document.createElement('div'); row.className = 'card-row'; row.appendChild(c);
        chatArea.appendChild(row);
      }
    });
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  /* ---------- fallback (offline) ---------- */
  function localReply(text) {
    var t = (text||'').toLowerCase();
    if (t.indexOf('hello')>=0||t.indexOf('hi')>=0) return 'Hello '+getUserName()+'! How can I help you today?';
    if (t.indexOf('book')>=0||t.indexOf('appoint')>=0) return 'I can book appointments for you! Which department do you need?';
    if (t.indexOf('emergency')>=0) return 'If this is urgent, please use the Emergency page immediately.';
    return "I'm your hospital assistant. I can book appointments, find doctors, and answer health questions. What do you need?";
  }

  /* ---------- send ---------- */
  function sendMessage() {
    var text = (input.value||'').trim();
    if (!text) return;
    addMsg(text, 'user');
    input.value = '';
    historyList.push({role:'user', parts:[{text:text}]});
    saveSession();
    addThinking();

    var me = getCurrentUser();
    var payload = {
      message:    text,
      history:    historyList,
      lang:       (window.I18N ? I18N.getLang() : 'en'),
      patient_id: (me && me.role==='patient') ? me.id : null,
      user_name:  me ? me.name : 'Guest',
      role:       me ? me.role : 'guest'
    };

    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/chat_ai', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.timeout = 30000;
    var replied = false;

    function finish(reply, toolResults, sentimentData) {
      if (replied) return; replied = true;
      removeThinking();
      addMsg(reply, 'bot');
      renderToolResults(toolResults || []);
      if (sentimentData) showSentiment(sentimentData);
      historyList.push({role:'model', parts:[{text:reply}]});
      saveSession();
    }

    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      try {
        var data = JSON.parse(xhr.responseText);
        finish(data.answer || localReply(text), data.tool_results, data.sentiment);
      } catch(e) { finish(localReply(text)); }
    };
    xhr.ontimeout = function() { finish(localReply(text)); };
    xhr.onerror   = function() { finish(localReply(text)); };
    xhr.send(JSON.stringify(payload));
  }

  /* ---------- sentiment indicator ---------- */
  var SENTIMENT_COLORS = {
    calm: null, anxious: '#fff3cd', frustrated: '#ffe0b2',
    distressed: '#ffcccc', pain: '#f8d7da'
  };
  var SENTIMENT_ICONS = {
    calm:'', anxious:'😟 ', frustrated:'😤 ', distressed:'😰 ', pain:'😣 '
  };
  function showSentiment(s) {
    var bar = document.getElementById('sentiment-bar');
    if (!s || s.sentiment === 'calm' || !s.sentiment) { bar.style.display='none'; return; }
    var color = SENTIMENT_COLORS[s.sentiment] || '#ffe0b2';
    bar.style.cssText = 'display:block;background:'+color+';padding:6px 12px;border-radius:8px;font-size:13px;margin-bottom:6px;';
    bar.textContent = SENTIMENT_ICONS[s.sentiment] + 'I noticed you may be feeling ' + s.sentiment + '. I am here to help.';
    if (s.alert) bar.textContent += ' Would you like me to alert a nurse?';
  }

  /* ---------- image upload (vision) ---------- */
  function handleImageUpload(input) {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      var b64 = e.target.result;
      // Show image preview in chat
      var div = document.createElement('div');
      div.className = 'message user';
      var img = document.createElement('img');
      img.src = b64; img.style.cssText = 'max-width:200px;border-radius:8px;display:block;';
      div.appendChild(img);
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;

      // Send to vision API
      addThinking();
      var me = getCurrentUser();
      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/vision_chat', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.timeout = 30000;
      var replied = false;
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4 || replied) return;
        replied = true; removeThinking();
        try {
          var data = JSON.parse(xhr.responseText);
          var reply = data.answer || 'I could not analyze the image.';
          addMsg(reply, 'bot');
          historyList.push({role:'model', parts:[{text:reply}]});
          saveSession();
        } catch(e) { addMsg('Could not analyze the image.', 'bot'); }
      };
      xhr.ontimeout = function(){ if(!replied){replied=true; removeThinking(); addMsg('Image analysis timed out.','bot');} };
      var payload = {
        image: b64,
        message: 'Please analyze this medical image and provide observations.',
        lang: (window.I18N ? I18N.getLang() : 'en'),
        patient_id: (me && me.role==='patient') ? me.id : null,
        user_name: me ? me.name : 'Guest',
        role: me ? me.role : 'guest'
      };
      xhr.send(JSON.stringify(payload));
    };
    reader.readAsDataURL(file);
    input.value = '';
  }

  /* ---------- save memory on page unload ---------- */
  window.addEventListener('beforeunload', function() {
    if (!historyList.length) return;
    var me = getCurrentUser();
    var payload = JSON.stringify({
      history: historyList,
      patient_id: (me && me.role==='patient') ? me.id : null
    });
    navigator.sendBeacon('/api/memory/save', new Blob([payload], {type:'application/json'}));
  });

  /* ---------- init ---------- */
  (function initChat() {
    var saved = loadSession();
    if (saved && saved.length) {
      historyList = saved;
      chatArea.innerHTML = '';
      saved.forEach(function(m) {
        var txt = m.parts && m.parts[0] ? m.parts[0].text : '';
        if (txt) addMsg(txt, m.role === 'user' ? 'user' : 'bot');
      });
    } else {
      addMsg('Hello ' + getUserName() + '! I am Pepper. I can book appointments, find doctors, check schedules, and answer your health questions. How can I help?', 'bot');
    }
  })();

  if (window.I18N) I18N.applyI18n();
  </script>
</body>
</html>
